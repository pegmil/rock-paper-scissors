<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Game Control Buttons -->
    <div class="game-container">
        <button class="choice-btn" value="rock">Rock</button>
        <button class="choice-btn" value="paper">Paper</button>
        <button class="choice-btn" value="scissors">Scissors</button>
    </div>

    <!-- Game Output Areas -->
    <div class="output-area">
        <h3 id="round-result">Choose your move to start the game!</h3>
        <p id="score-board">Player: 0  | Computer: 0</p>
    </div>

    <script src="script.js" defer></script>
</body>

</html>
